<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 · MuMucraft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
       <!-- ========== 强制更改密码模态框 ========== -->
    <div class="modal-overlay" id="changePasswordModal" style="display:none;">
        <div class="modal-box">
            <h2><i class="fas fa-key" style="color:#f0b90b;"></i> 强制更改密码</h2>
            <p>检测到您正在使用初始密码，为了安全请立即修改。</p>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="newPassword" placeholder="请输入新密码" required>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
                </div>
                <button type="submit" class="submit-btn" style="width:100%;">确认修改</button>
                <div class="error-msg" id="changePwError"></div>
            </form>
        </div>
    </div>

    <!-- ========== 忘记密码重置模态框 ========== -->
    <div class="modal-overlay" id="resetPasswordModal" style="display:none;">
        <div class="modal-box">
            <h2><i class="fas fa-undo-alt" style="color:#f0b90b;"></i> 重置密码（使用初始密码）</h2>
            <p>请输入初始密码（默认 muop123ggp），验证通过后可设置新密码。</p>
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label>初始密码</label>
                    <input type="password" id="initialPassword" placeholder="请输入初始密码" required>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="resetNewPassword" placeholder="请输入新密码" required>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" id="resetConfirmPassword" placeholder="请再次输入新密码" required>
                </div>
                <button type="submit" class="submit-btn" style="width:100%;">重置密码</button>
                <div class="error-msg" id="resetPwError"></div>
                <p style="margin-top:12px; font-size:13px; color:#666688;">
                    <a href="#" id="closeResetModalLink">取消</a>
                </p>
            </form>
        </div>
    </div>

    <!-- ========== 更改用户名模态框 ========== -->
    <div class="modal-overlay" id="changeUsernameModal" style="display:none;">
        <div class="modal-box">
            <h2><i class="fas fa-user-cog" style="color:#f0b90b;"></i> 更改管理员用户名</h2>
            <p>首次登录请修改用户名，修改后下次登录请使用新用户名。</p>
            <form id="changeUsernameForm">
                <div class="form-group">
                    <label>当前密码 <span class="required">*</span></label>
                    <input type="password" id="currentPwForUser" placeholder="请输入当前密码" required>
                </div>
                <div class="form-group">
                    <label>新用户名 <span class="required">*</span></label>
                    <input type="text" id="newUsername" placeholder="请输入新用户名" required>
                </div>
                <button type="submit" class="submit-btn" style="width:100%;">确认更改</button>
                <div class="error-msg" id="changeUserError"></div>
                <p style="margin-top:12px; font-size:13px; color:#666688;">
                    <a href="#" id="closeUserModalLink">取消</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
