<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白名单申请 · MuMucraft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo"><i class="fas fa-cube"></i> MuMucraft</div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> 首页</a>
                <a class="active" href="apply.html"><i class="fas fa-clipboard-list"></i> 白名单申请</a>
                <a href="contact.html"><i class="fas fa-address-card"></i> 联系我们</a>
                <a class="admin-btn" href="admin.html"><i class="fas fa-lock"></i> 后台管理</a>
            </div>
        </div>
    </nav>

    <section class="apply-section">
        <div class="container">
            <div class="apply-wrapper">
                <div class="apply-form">
                    <h2><i class="fas fa-pen-fancy" style="color:#f0b90b;"></i> 白名单申请</h2>
                    <p class="sub">填写以下信息，管理员审核通过后即可加入服务器。<br>同一QQ可申请多个游戏ID。</p>
                    <form id="applyForm">
                        <div class="form-group">
                            <label>游戏 ID <span class="required">*</span></label>
                            <input type="text" id="applyGameId" placeholder="请输入你的游戏 ID" required>
                        </div>
                        <div class="form-group">
                            <label>QQ 号 <span class="required">*</span></label>
                            <input type="text" id="applyQQ" placeholder="请输入 QQ 号" required>
                        </div>
                        <div class="form-group">
                            <label>确认 QQ 号 <span class="required">*</span></label>
                            <input type="text" id="applyQQConfirm" placeholder="请再次输入 QQ 号" required>
                        </div>
                        <div class="form-group">
                            <label>QQ 群昵称 <span class="required">*</span></label>
                            <input type="text" id="groupNickname" placeholder="请先加群（群号：965757731），填写你在群内的昵称" required>
                            <small style="color:#8888aa; display:block; margin-top:4px;">管理员将根据昵称在群内核对身份，请务必填写正确。</small>
                        </div>

                        <!-- 版本选择 -->
                        <div class="form-group">
                            <label>游戏版本 <span class="required">*</span></label>
                            <select id="gameVersion" required>
                                <option value="">请选择...</option>
                                <option value="Java版">Java版</option>
                                <option value="基岩版">基岩版</option>
                            </select>
                        </div>

                        <!-- 是否正版（将根据版本控制显示） -->
                        <div class="form-group" id="originalGroup">
                            <label>是否为正版玩家 <span class="required">*</span></label>
                            <select id="isOriginal" required>
                                <option value="">请选择...</option>
                                <option value="是">是</option>
                                <option value="否">否</option>
                            </select>
                        </div>

                        <!-- 是否多账号 -->
                        <div class="form-group">
                            <label>是否拥有多个账号 <span class="required">*</span></label>
                            <select id="hasMultipleAccounts" required>
                                <option value="">请选择...</option>
                                <option value="是">是</option>
                                <option value="否">否</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>年龄</label>
                            <input type="number" id="applyAge" placeholder="请输入年龄（选填）" min="1" max="120">
                        </div>
                        <div class="form-group">
                            <label>自我介绍 / 申请理由 <span class="required">*</span></label>
                            <textarea id="applyReason" placeholder="简单介绍一下自己，以及为什么想加入我们..." required></textarea>
                        </div>
                        <div class="form-group" style="margin-top:10px;">
                            <label style="font-weight:normal; display:flex; align-items:center; gap:8px;">
                                <input type="checkbox" id="agreeCheck" required>
                                <span>我保证所填 QQ 号真实有效，并愿意配合管理员验证。</span>
                            </label>
                        </div>
                        <button type="submit" class="submit-btn" id="applySubmitBtn">
                            <i class="fas fa-paper-plane"></i> 提交申请
                        </button>
                    </form>
                </div>

                <div class="apply-status" id="queryArea">
                    <h2><i class="fas fa-search" style="color:#f0b90b;"></i> 白名单审核查询</h2>
                    <p class="sub">输入你的 QQ 号，即可查看所有申请记录及审核状态。</p>
                    <div class="status-query">
                        <input type="text" id="queryQQ" placeholder="请输入 QQ 号">
                        <button id="queryBtn"><i class="fas fa-search"></i> 查询</button>
                    </div>
                    <div class="status-result" id="statusResult">
                        <div class="empty"><i class="fas fa-inbox"></i> 输入 QQ 号后点击查询</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="footer">
        <div class="container">
            <p>© 2026 <span>MuMuctaft</span> · 我的世界服务器 · 用 ❤️ 打造</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
